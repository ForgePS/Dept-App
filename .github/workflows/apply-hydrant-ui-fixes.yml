name: Apply hydrant UI fixes

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/apply-hydrant-ui-fixes.cjs
      - run: npm run build
      - name: Commit changes
        run: |
          rm .github/workflows/apply-hydrant-ui-fixes.yml
          rm scripts/apply-hydrant-ui-fixes.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/HydrantTestingPage.jsx .github/workflows/apply-hydrant-ui-fixes.yml scripts/apply-hydrant-ui-fixes.cjs
          git commit -m "Update hydrant dashboard crew fields and icon colors"
          git push
