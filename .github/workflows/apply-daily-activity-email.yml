name: Apply daily activity email

on:
  push:
    paths:
      - '.github/workflows/apply-daily-activity-email.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/apply-daily-activity-email.cjs
      - run: npm run build
      - name: Commit patch
        run: |
          rm .github/workflows/apply-daily-activity-email.yml scripts/apply-daily-activity-email.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add server.cjs src/pages/HydrantTestingPage.jsx .github/workflows/apply-daily-activity-email.yml scripts/apply-daily-activity-email.cjs
          git commit -m "Add daily activity CSV email export"
          git push
