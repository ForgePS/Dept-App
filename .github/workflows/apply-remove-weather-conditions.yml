name: Apply remove weather conditions

on:
  push:
    paths:
      - '.github/workflows/apply-remove-weather-conditions.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/apply-remove-weather-conditions.cjs
      - run: npm run build
      - name: Commit patch
        run: |
          rm .github/workflows/apply-remove-weather-conditions.yml scripts/apply-remove-weather-conditions.cjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/pages/HydrantTestingPage.jsx .github/workflows/apply-remove-weather-conditions.yml scripts/apply-remove-weather-conditions.cjs
          git commit -m "Remove inspection weather conditions field"
          git push
